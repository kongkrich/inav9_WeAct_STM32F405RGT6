name: Build WeAct STM32F405RG

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout iNav 9.0.1 (Official)
        uses: actions/checkout@v4
        with:
          repository: iNavFlight/inav
          ref: '9.0.1'
          submodules: recursive
          fetch-depth: 0

      - name: Inject My Custom Target
        run: |
          mkdir -p src/main/target/WeActF405
          git clone --depth 1 https://github.com/kongkrich/inav9_WeAct_STM32F405RGT6.git temp_repo
          cp -r temp_repo/src/main/target/WeActF405/* src/main/target/WeActF405/
          

      - name: Install ARM toolchain & build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-arm-none-eabi \
            cmake \
            ninja-build \
            python3

      - name: Build Firmware
        run: |
          mkdir -p build
          cd build
          cmake .. -DTARGET=WeActF405 -G Ninja
          ninja WeActF405

      - name: Show build output files
        run: |
          echo "=== All .hex files ==="
          find . -name "*.hex" 2>/dev/null
          echo "=== All .bin files ==="
          find . -name "*.bin" 2>/dev/null

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: inav9-WeActF405
          path: |
            build/**/*.hex
            build/**/*.bin
          if-no-files-found: warn
